name: Workflow Monitor

on:
  workflow_run:
    workflows:
      - "CI Pipeline"
      - "Test Suite"
      - "Security Scan"
      - "Deploy to Staging"
      - "Deploy to Production"
      - "Literati CI/CD Pipeline"
      - "Production Ready CI/CD"
    types:
      - completed

permissions:
  issues: write

jobs:
  on-failure:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Create or update failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const workflowName = run.name;
            const issueTitle = `CI Failure: ${workflowName}`;
            const label = 'ci-failure';
            const branch = run.head_branch;
            const sha = run.head_sha.substring(0, 7);
            const runUrl = run.html_url;
            const runId = run.id;

            // Fetch failed jobs for this run
            const { data: jobsData } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
              filter: 'latest',
            });

            const failedJobs = jobsData.jobs
              .filter(job => job.conclusion === 'failure')
              .map(job => `- [${job.name}](${job.html_url})`)
              .join('\n');

            const body = [
              `## ${workflowName} failed`,
              '',
              `| Detail | Value |`,
              `|--------|-------|`,
              `| **Workflow** | ${workflowName} |`,
              `| **Branch** | \`${branch}\` |`,
              `| **Commit** | \`${sha}\` |`,
              `| **Run** | [View run](${runUrl}) |`,
              '',
              '### Failed jobs',
              failedJobs || '_No individual job failures detected_',
              '',
              '---',
              '_This issue was automatically created by the Workflow Monitor._',
            ].join('\n');

            // Search for an existing open issue with the same title
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: label,
              state: 'open',
            });

            const existing = issues.find(i => i.title === issueTitle);

            if (existing) {
              // Add a comment to the existing issue instead of creating a duplicate
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: [
                  `### Failure recurrence`,
                  '',
                  `| Detail | Value |`,
                  `|--------|-------|`,
                  `| **Branch** | \`${branch}\` |`,
                  `| **Commit** | \`${sha}\` |`,
                  `| **Run** | [View run](${runUrl}) |`,
                  '',
                  '#### Failed jobs',
                  failedJobs || '_No individual job failures detected_',
                ].join('\n'),
              });
              console.log(`Commented on existing issue #${existing.number}`);
            } else {
              // Create a new issue
              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body: body,
                labels: [label],
              });
              console.log(`Created issue #${issue.number}`);
            }

  on-success:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Close resolved failure issues
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const workflowName = run.name;
            const issueTitle = `CI Failure: ${workflowName}`;
            const label = 'ci-failure';

            // Find open issues with the ci-failure label for this workflow
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: label,
              state: 'open',
            });

            const matching = issues.filter(i => i.title === issueTitle);

            for (const issue of matching) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: [
                  `### Resolved`,
                  '',
                  `**${workflowName}** is passing again on \`${run.head_branch}\` ([\`${run.head_sha.substring(0, 7)}\`](${run.html_url})).`,
                  '',
                  '_Auto-closing this issue._',
                ].join('\n'),
              });

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });

              console.log(`Closed issue #${issue.number}`);
            }
