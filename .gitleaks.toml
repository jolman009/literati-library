# and no longer resolves (`git cat-file -t <sha>` → "could not get object
# info"). They are harmless (gitleaks ignores unknown commits) but no longer do
# anything. The env-file findings they used to cover are now handled durably by
# the `paths` allowlist above; the CI JWT placeholder by the `regexes` above.
# Kept as an audit trail of what was reviewed. Re-map or delete on next cleanup.
commits = [
    "a85cabc3d97defa5d4c2f2826c6593cd1ba7a5ad",  # Google API key in .env.production (revoked)
    "4cf251d5ce7223b59ffb51dd0cf7dc0f7f8c05a2",  # Google API key in .env.development (revoked)
    "9ba41f1dab71b66b0ab56638328b148d640d82a4",  # Supabase anon key in .env.production (public anon, RLS-protected)
    "b8b9bd8e91d1d22fe5d5a41de6e6d615f393492f",  # init commit with .env.production
    "610b2a7e0ac30a94cc8669c011065022d7f5ab9d",  # Supabase anon key in .env.development
    "0bf1eb5a465ac0bc255a5c008218fecd962afb40",  # Supabase anon key in extension/.env.development
    "de37423d54d2078e9159d0bdc01a94b15f7f885c",  # workflow curl-auth-header examples
    "924b54a12e095dff1dcf5e5c1b2c37d0147a719b",  # init CI/CD pipeline with workflow secret refs
    "f836c3b26161a49e4e3e1acea8a5389e3fa1ac95",  # .env.example placeholders added
    "646e52341453e8406d5401e77f87d70925499f78",  # server .env.example/.env.test placeholders
    "5d4dcc473537dd9ab885b7932ec42b4f57c4b16e",  # fake JWT in security.spec.js test
    "33a058149db9e71a617ddcdd5b184e63019257b2",  # gamification docs curl examples
    "2e91451db24bdccb6bce24b1e732cd1f5cf644e1",  # legal/data-export-implementation.md curl examples
    "d5fbc45e4d2ef86a61c56cc36e8763e6c962c9a0",  # server2/SECURITY_DOCUMENTATION.md curl example
    "869fd4bef4ee554c8fdfc0466b319442e5e35117",  # docs/API.md + docs/DEPLOYMENT.md examples
    "a5173073e2fe873ce9277a569d2a2f05c9f366e4",  # docs/DOCKER.md placeholder env snippet
