# Placeholder strings that look secret-shaped but are documentation literals
# or test fixtures. Matched anywhere in a finding's secret/match.
regexes = [
    '''your[-_](?:secret|api[-_]?key|password|token)''',
    '''your[-_]super[-_]secure[-_]secret''',
    '''placeholder[-_](?:key|secret|token|password)''',
    '''(?:invalid|valid|fake|test|mock|example|sample|dummy)[-_]token''',
    '''regular[-_]user[-_]token''',
    '''test_jwt_secret[-_a-z0-9]*''',  # CI workflow placeholder (e.g. test_jwt_secret_32_characters_long in ci.yml / ci-cd-integrated.yml)
    '''xxxxx''',  # docs commonly redact with x's
]
