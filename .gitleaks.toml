# GitLeaks configuration for ShelfQuest / Literati-Library
#
# The default GitLeaks rules are aggressive on entropy/regex and produce many
# false positives against documentation, examples, and test fixtures. This
# config inherits the upstream defaults and layers project-specific allowlists
# on top.
#
# Real secrets (Google API key, Vercel token) discovered by TruffleHog have been
# rotated and revoked — those historical values are now dead, so allowlisting
# their containing commits poses no risk. New live secrets in unallowlisted
# locations will still trip the scanner.
#
# ⚠️  HISTORY-REWRITE GOTCHA (learned 2026-06-08):
# The scheduled (cron) gitleaks run scans the FULL history; push runs scan only
# the diff. Allowlisting by *commit SHA* is fragile: a `git filter-repo` /
# rebase rewrites every downstream SHA, so the `commits = [...]` list below
# silently becomes dead pointers and the scanner re-flags everything it was
# suppressing. The 2026-06-06 zip-key purge did exactly this. Prefer DURABLE
# allowlists (paths / value-regexes) for known dead-or-public values; reserve
# commit-SHA entries for things that can't be matched any other way, and expect
# to re-map them after any history rewrite.
#
# Schema docs: https://github.com/gitleaks/gitleaks#configuration
# All allowlist members (paths, commits, regexes, stopwords) must be flat
# arrays of strings directly under [allowlist].

[extend]
# Inherit the upstream default rules so we don't regress detection coverage.
useDefault = true

# Defense-in-depth rule tied to the 2026-06-06 incident: a live Google AI Studio
# (Gemini) key leaked via ai-service/.env *inside* a committed ai-service.zip.
# IMPORTANT: gitleaks scans git text content, NOT the contents of binary archives,
# so this rule would NOT have caught the zipped key — the primary guard is the
# `*.zip` ignore in .gitignore. This named rule is here so that any future
# plaintext occurrence of an AIza-prefixed key is flagged with a clear, on-purpose
# rule id (the upstream gcp-api-key rule also matches; a named hit aids triage).
[[rules]]
id = "google-ai-studio-key"
description = "Google API key (AIza-prefixed: AI Studio / Gemini / GCP)"
regex = '''AIza[0-9A-Za-z_\-]{35}'''
keywords = ["AIza"]

[allowlist]
description = "Project-wide allowlist for known false positives"

# Path-based allowlist: anything matching these regexes is exempt from all
# rules. Scoped to files that exist precisely to hold placeholder/example/test
# values or that document API usage with sample curl commands.
paths = [
    # Example/template env files (intentionally contain `your_*_key` placeholders
    # and truncated example tokens like `eyJhbGciOiJIUzI1NiIs...`)
    '''(.*/)?\.env\.example$''',
    '''(.*/)?\.env\.test$''',
    '''(.*/)?\.env\.production\.example$''',
    '''(.*/)?\.env\.development\.example$''',

    # Real env files (client2/.env.production, client2/.env.development,
    # extension/.env.development). These are gitignored, so they cannot be
    # committed going forward — only historical commits (from before they were
    # gitignored) contain them, and they hold browser-public values:
    #   - Supabase ANON keys (public by design, RLS-protected)
    #   - VITE_GOOGLE_API_KEY (a VITE_ browser key already shipped in the client
    #     bundle; secured by Google Cloud Console referrer/API restrictions, NOT
    #     secrecy — so its presence in history is not an added exposure).
    # Path-allowlisting is DURABLE across history rewrites (unlike commit SHAs,
    # which rot — see the note on the `commits` list below).
    '''(.*/)?\.env\.production$''',
    '''(.*/)?\.env\.development$''',

    # Dead BYOK relic. restore-anthropic-key.html stored an Anthropic key as
    # base64 (the "encryption" in utils/crypto.js was Caesar-shift + base64, i.e.
    # no secret at all). The underlying key was liveness-tested 2026-06-09 ->
    # HTTP 401 "invalid x-api-key" (revoked/dead), and the file was deleted from
    # the tree. A sweep found no sibling restore-*-key.html files for other
    # providers. Allowlisted so a future gitleaks-action scanner bump (its current
    # binary lacks the anthropic-api-key rule, so CI doesn't flag this yet) won't
    # start failing on the inert blob.
    '''(.*/)?restore-anthropic-key\.html$''',

    # Documentation that includes sample curl/env snippets
    '''docs/.*\.md$''',
    '''legal/.*\.md$''',
    '''security-audit/.*\.md$''',
    '''server2/SECURITY_DOCUMENTATION\.md$''',
    '''GAMIFICATION_INTEGRATION_GUIDE\.md$''',
    '''GAMIFICATION_INTEGRATION_STATUS\.md$''',
    '''DEPLOYMENT_AUTOMATION_SETUP\.md$''',

    # Test fixtures with intentionally-fake tokens (e.g. expired-JWT simulation)
    '''client2/tests/.*''',
    '''server2/tests/.*''',
    '''test-supabase-connection\.js$''',
    '''run_readiness\.ps1$''',
]

# Reviewed historical commits. These contained either credentials that have
